server {
    listen 8080;

    # Proxy API routes to uvicorn; proxy_buffering off is required for SSE streaming
    location ~ ^/(hedge-fund|language-models|storage|flow-runs|flows|api-keys|ollama|ping) {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
    }

    # Serve React SPA; unknown paths fall back to index.html for client-side routing
    location / {
        root /var/www/html;
        try_files $uri $uri/ /index.html;
    }
}
